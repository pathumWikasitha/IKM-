<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKMS RAG Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <div>
                    <h1>IKMS Multi-Agent RAG</h1>
                    <p>Ask questions about vector databases. Analyzing with Planning, Retrieval, Summarization, and
                        Verification agents.</p>
                </div>
                <div class="toggle-container">
                    <label class="switch">
                        <input type="checkbox" id="planning-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                    <span class="toggle-label">Query Planning</span>
                </div>
            </div>
        </header>

        <main id="chat-container">
            <!-- Messages will appear here -->
            <div class="message bot-message">
                <div class="message-content">
                    Hello! I'm your research assistant. Ask me anything about the vector databases paper.
                </div>
            </div>
        </main>

        <div class="input-area">
            <textarea id="question-input"
                placeholder="Type your question here... (e.g., 'Compare vector DBs and traditional DBs')"></textarea>
            <button id="send-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
